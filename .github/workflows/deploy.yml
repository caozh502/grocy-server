name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 132.226.82.250
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          script: |
            cd ~/grocy-server
            git pull
            pkill -f grocy_bot.py 2>/dev/null || true
            sleep 1
            nohup python3 ~/grocy-server/grocy_bot.py > ~/grocy_bot.log 2>&1 &
            echo "✅ Deploy complete"
