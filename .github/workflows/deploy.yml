name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 132.226.82.250
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/grocy-server && git pull
            sudo systemctl restart grocy-bot
            echo "✅ Deploy complete"
