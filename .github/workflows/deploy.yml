name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'ubuntu' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/grocy-server && git pull
            chmod +x deploy.sh && bash deploy.sh
