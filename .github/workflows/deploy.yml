name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 132.226.82.250
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script_timeout: 60s
          script: |
            whoami
            cd ~/grocy-server && git pull
            pkill -f grocy_bot.py || true
            sleep 1
            cd ~/grocy-server && nohup python3 grocy_bot.py > ~/grocy_bot.log 2>&1 &
            echo done
