name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 132.226.82.250 >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ubuntu@132.226.82.250 "
            cd ~/grocy-server
            git pull
            pkill -f grocy_bot.py 2>/dev/null || true
            sleep 1
            nohup python3 ~/grocy-server/grocy_bot.py > ~/grocy_bot.log 2>&1 &
            echo '✅ Deploy complete'
          "
